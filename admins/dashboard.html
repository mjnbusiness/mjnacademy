<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>mjnacademy · Admin Panel</title>
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Admin specific styles -->
  <link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin-app">
  <!-- Top navbar -->
  <nav class="admin-navbar">
    <div class="logo-area">
      <div class="logo-svg">M</div>
      <span class="brand-text">mjn<span style="color:#f97316">academy</span> / Admin</span>
    </div>
    <div class="nav-right">
      <button id="view-site-btn" class="nav-link"><i class="fas fa-external-link-alt"></i> View Site</button>
      <button id="admin-logout-btn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </nav>

  <div class="admin-container">
    <!-- Tab navigation -->
    <div class="admin-tabs" id="admin-tabs">
      <button class="admin-tab" data-tab="stats"><i class="fas fa-chart-line"></i> Dashboard</button>
      <button class="admin-tab" data-tab="users"><i class="fas fa-users"></i> Users & Requests</button>
      <button class="admin-tab" data-tab="courses"><i class="fas fa-book"></i> Courses</button>
      <button class="admin-tab" data-tab="modules"><i class="fas fa-video"></i> Modules & Videos</button>
      <button class="admin-tab" data-tab="downloads"><i class="fas fa-download"></i> Downloads</button>
      <button class="admin-tab" data-tab="enrollments"><i class="fas fa-graduation-cap"></i> Enrollments</button>
    </div>

    <!-- Tab content container -->
    <div id="admin-tab-content" class="admin-tab-content">
      <div class="loading-spinner"></div> Loading...
    </div>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
